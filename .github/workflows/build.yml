name: Build macOS CLI

on:
  push:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile compound_interest.py

      - name: Stage release folder
        run: |
          mkdir release
          cp dist/compound_interest release/
          cp run.command release/
          chmod +x release/run.command   # pre-set permissions in the zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: compound-interest-mac
          path: release/
